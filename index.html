<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Rally Route Master v1.1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --accent: #f0ad4e;
            --danger: #d9534f;
            --success: #5cb85c;
            --text: #ffffff;
        }

        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Map takes up 65% of screen */
        #map { height: 65vh; width: 100%; background: #000; touch-action: none; }

        /* UI Panel takes up 35% of screen */
        .ui-panel { 
            height: 35vh; 
            padding: 12px; 
            display: grid; 
            grid-template-rows: auto 1fr 1fr; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            box-sizing: border-box; 
            background: var(--panel);
            border-top: 2px solid #333;
        }

        .stats { 
            grid-column: span 2; 
            display: flex; 
            justify-content: space-between; 
            font-family: "Courier New", monospace; 
            font-size: 16px; 
            background: #000; 
            padding: 8px 12px; 
            border-radius: 6px;
            border: 1px solid #444;
        }

        button { 
            border: none; border-radius: 10px; color: white; font-weight: 800; 
            font-size: 16px; text-transform: uppercase; cursor: pointer;
            touch-action: manipulation;
        }

        .btn-record { 
            grid-column: span 2; 
            background: var(--success); 
            box-shadow: 0 4px 0 #3e8e41;
        }

        .btn-record.active { 
            background: var(--danger); 
            box-shadow: 0 4px 0 #a94442;
            animation: pulse 1.5s infinite; 
        }

        .btn-action { background: #444; box-shadow: 0 4px 0 #222; }
        .btn-action:active { transform: translateY(2px); box-shadow: 0 2px 0 #222; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel">
    <div class="stats">
        <span id="stat-points">PTS: 0</span>
        <span id="stat-dist">0.00 km</span>
    </div>
    
    <button id="recordBtn" class="btn-record" onclick="toggleRecording()">Start Recce Recording</button>
    <button class="btn-action" onclick="downloadGPX()">Save GPX</button>
    <button class="btn-action" onclick="clearRoute()">Clear All</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let points = [];
    let totalDist = 0;
    let isRecording = false;
    let watchID = null;
    let wakeLock = null;

    // Initialize Map with Dark Mode Tiles
    const map = L.map('map', { zoomControl: false }).setView([52.13, -4.06], 13); // Centered near Lampeter area
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© CartoDB'
    }).addTo(map);

    let routeLine = L.polyline([], {color: '#00ffcc', weight: 6, opacity: 0.9}).addTo(map);

    // Manual Plotting
    map.on('click', (e) => {
        if (isRecording) return;
        addPoint(e.latlng.lat, e.latlng.lng);
    });

    function addPoint(lat, lon) {
        const newPos = L.latLng(lat, lon);
        
        if (points.length > 0) {
            const lastPos = L.latLng(points[points.length-1].lat, points[points.length-1].lon);
            totalDist += lastPos.distanceTo(newPos) / 1000;
        }

        points.push({lat: lat.toFixed(6), lon: lon.toFixed(6)});
        routeLine.addLatLng(newPos);
        updateUI();
    }

    async function toggleRecording() {
        const btn = document.getElementById('recordBtn');
        isRecording = !isRecording;

        if (isRecording) {
            btn.innerText = "⏺ Recording Path...";
            btn.classList.add('active');
            
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}

            watchID = navigator.geolocation.watchPosition(
                (pos) => {
                    addPoint(pos.coords.latitude, pos.coords.longitude);
                    map.panTo([pos.coords.latitude, pos.coords.longitude]);
                },
                (err) => console.error(err),
                { enableHighAccuracy: true, maximumAge: 0 }
            );
        } else {
            btn.innerText = "Start Recce Recording";
            btn.classList.remove('active');
            navigator.geolocation.clearWatch(watchID);
            if (wakeLock) wakeLock.release();
        }
    }

    function updateUI() {
        document.getElementById('stat-points').innerText = `PTS: ${points.length}`;
        document.getElementById('stat-dist').innerText = `${totalDist.toFixed(2)} km`;
    }

    function downloadGPX() {
        if(points.length < 2) return alert("Plot at least 2 points.");
        
        let gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="RallyRouteMaster" xmlns="http://www.topografix.com/GPX/1/1">
  <trk><name>Recce_${new Date().toISOString()}</name><trkseg>`;
        
        points.forEach(p => {
            gpx += `\n    <trkpt lat="${p.lat}" lon="${p.lon}"><ele>0</ele></trkpt>`;
        });

        gpx += `\n  </trkseg></trk></gpx>`;

        const blob = new Blob([gpx], { type: 'application/gpx+xml' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `rally_route_${Math.floor(Date.now()/1000)}.gpx`;
        a.click();
    }

    function clearRoute() {
        if(!confirm("Delete this route?")) return;
        points = [];
        totalDist = 0;
        routeLine.setLatLngs([]);
        updateUI();
    }
</script>
</body>
</html>
