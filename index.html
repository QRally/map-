<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#00ffcc">
    <title>QRally v1.7 - TC Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #f8f9fa; --panel: #222222; --accent: #00ffcc;
            --danger: #ff4444; --success: #28a745; --warning: #ff9800;
        }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; background: var(--bg); font-family: -apple-system, sans-serif; }
        #map { flex-grow: 1; width: 100%; }
        
        /* THE CRITICAL FIX: Hide any image-based markers */
        .leaflet-marker-icon { display: none !important; }
        /* Keep the blue dot (Live Marker) and orange circles (TCs) visible */
        .leaflet-interactive { display: block !important; }

        .ui-panel { 
            flex-shrink: 0; padding: 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom));
            display: grid; grid-template-columns: 1fr; gap: 10px; 
            background: var(--panel); border-top: 3px solid var(--accent);
        }
        .stats { 
            display: flex; justify-content: space-between; font-family: monospace; 
            font-size: 20px; font-weight: bold; background: #000; 
            color: var(--accent); padding: 12px; border-radius: 8px; border: 1px solid #444;
        }
        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        button { border: none; border-radius: 10px; color: white; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .btn-record { min-height: 65px; background: var(--success); font-size: 18px; width: 100%; }
        .btn-record.active { background: var(--danger); animation: pulse 1s infinite; }
        .btn-action { min-height: 60px; background: #555; font-size: 12px; }
        .btn-tc { background: var(--warning); }
        #fileInput { display: none; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body onload="checkRecoveryData()">

    <div id="map"></div>

    <div class="ui-panel">
        <div class="stats" id="stats-bar">
            <span id="stat-points">PTS: 0</span>
            <span id="stat-dist">0.00 km</span>
        </div>
        <button id="recordBtn" class="btn-record" onclick="toggleRecording()">Start Recording</button>
        <div class="action-grid">
            <button class="btn-action btn-tc" onclick="dropTC()">TC</button>
            <button class="btn-action" onclick="document.getElementById('fileInput').click()">IN</button>
            <button class="btn-action" onclick="downloadGPX()">SAVE</button>
            <button class="btn-action" onclick="clearRoute()">CLR</button>
        </div>
        <input type="file" id="fileInput" accept=".gpx" onchange="importGPX(event)">
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

    <script>
        let points = [], waypoints = [], targetTCs = [];
        let totalDist = 0, isRecording = false, liveMarker = null, gpxLayer = null, lastTriggeredTC = null;

        const map = L.map('map', { zoomControl: false }).setView([52.13, -4.06], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let routeLine = L.polyline([], {color: '#ff0000', weight: 6}).addTo(map);

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((pos) => {
                const { latitude, longitude } = pos.coords;
                if (!liveMarker) {
                    liveMarker = L.circleMarker([latitude, longitude], { radius: 10, fillColor: "#007bff", color: "#fff", weight: 3, fillOpacity: 1 }).addTo(map);
                } else { liveMarker.setLatLng([latitude, longitude]); }
                
                checkTCProximity(latitude, longitude);
                if (isRecording) {
                    addPoint(latitude, longitude);
                    map.panTo([latitude, longitude]);
                }
            }, null, { enableHighAccuracy: true });
        }

        function addPoint(lat, lon) {
            const newPos = L.latLng(lat, lon);
            if (points.length > 0) {
                const lastPos = L.latLng(points[points.length-1].lat, points[points.length-1].lon);
                totalDist += lastPos.distanceTo(newPos) / 1000;
            }
            points.push({lat: lat.toFixed(6), lon: lon.toFixed(6)});
            routeLine.addLatLng(newPos);
            updateUI();
        }

        function dropTC() {
            if (!isRecording) return alert("Start Recording first!");
            const last = points[points.length - 1];
            const tc = { lat: last.lat, lon: last.lon, id: waypoints.length + 1 };
            waypoints.push(tc);
            L.circleMarker([tc.lat, tc.lon], { radius: 12, fillColor: "#ff9800", color: "#fff", weight: 3, fillOpacity: 1 }).addTo(map);
        }

        function importGPX(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                if (gpxLayer) map.removeLayer(gpxLayer);
                gpxLayer = new L.GPX(e.target.result, {
                    async: true,
                    marker_options: { startIconUrl: '', endIconUrl: '', wpIconUrl: '' }
                }).on('loaded', (e) => {
                    targetTCs = [];
                    e.target.get_waypoints().forEach((wp, i) => {
                        const pos = wp.getLatLng();
                        targetTCs.push({ id: i + 1, lat: pos.lat, lon: pos.lng });
                        L.circleMarker([pos.lat, pos.lon], { radius: 12, fillColor: "#ff9800", color: "#000", weight: 2, fillOpacity: 0.8 }).addTo(map);
                    });
                    map.fitBounds(e.target.getBounds());
                }).addTo(map);
            };
            reader.readAsText(event.target.files[0]);
        }

        function checkTCProximity(lat, lon) {
            if (targetTCs.length === 0) return;
            const currentPos = L.latLng(lat, lon);
            targetTCs.forEach(tc => {
                if (lastTriggeredTC !== tc.id && currentPos.distanceTo(L.latLng(tc.lat, tc.lon)) < 30) {
                    lastTriggeredTC = tc.id;
                    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
                    alert("CHECKPOINT REACHED: TC " + tc.id);
                }
            });
        }

        function updateUI() {
            document.getElementById('stat-points').innerText = `PTS: ${points.length}`;
            document.getElementById('stat-dist').innerText = `${totalDist.toFixed(2)} km`;
        }

        function toggleRecording() {
            isRecording = !isRecording;
            const btn = document.getElementById('recordBtn');
            btn.innerText = isRecording ? "⏺ RECORDING..." : "START RECORDING";
            btn.classList.toggle('active', isRecording);
        }

        function clearRoute() {
            if(confirm("Wipe all?")) location.reload();
        }

        function checkRecoveryData() {} 
    </script>
</body>
</html>
