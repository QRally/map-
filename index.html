<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Rally Route Master v1.2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #f8f9fa;
            --panel: #222222;
            --accent: #00ffcc;
            --danger: #ff4444;
            --success: #28a745;
            --text-light: #ffffff;
        }

        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
        }

        #map { 
            flex-grow: 1; 
            width: 100%; 
            background: #ddd; 
        }

        .ui-panel { 
            flex-shrink: 0;
            padding: 20px; 
            /* env() handles the "notch" or home bar area on modern iPhones/Androids */
            padding-bottom: calc(20px + env(safe-area-inset-bottom)); 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            background: var(--panel);
            border-top: 3px solid var(--accent);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }

        .stats { 
            grid-column: span 2; 
            display: flex; 
            justify-content: space-between; 
            font-family: "Courier New", monospace; 
            font-size: 22px; 
            font-weight: bold;
            background: #000; 
            color: var(--accent);
            padding: 15px; 
            border-radius: 8px;
            margin-bottom: 10px;
        }

        button { 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-weight: 900; 
            font-size: 18px; 
            text-transform: uppercase; 
            cursor: pointer;
            /* Taller buttons for easier use in a moving vehicle */
            min-height: 75px;
            touch-action: manipulation;
            transition: transform 0.1s, filter 0.1s;
        }

        button:active {
            transform: scale(0.96);
            filter: brightness(0.8);
        }

        .btn-record { 
            grid-column: span 2; 
            background: var(--success); 
            border-bottom: 5px solid #1e7e34;
        }

        .btn-record.active { 
            background: var(--danger); 
            border-bottom: 5px solid #bd2130;
            animation: pulse 1s infinite; 
        }

        .btn-action { 
            background: #555; 
            border-bottom: 5px solid #333;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-panel">
        <div class="stats">
            <span id="stat-points">PTS: 0</span>
            <span id="stat-dist">0.00 km</span>
        </div>
        
        <button id="recordBtn" class="btn-record" onclick="toggleRecording()">Start Recce Recording</button>
        <button class="btn-action" onclick="downloadGPX()">Save GPX</button>
        <button class="btn-action" onclick="clearRoute()">Clear All</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let points = [];
        let totalDist = 0;
        let isRecording = false;
        let watchID = null;
        let wakeLock = null;

        // Map setup with Conventional Tiles (OpenStreetMap)
        const map = L.map('map', { zoomControl: false }).setView([52.13, -4.06], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Bold red line for the route to stand out against standard tiles
        let routeLine = L.polyline([], {color: '#ff0000', weight: 8, opacity: 0.8}).addTo(map);

        map.on('click', (e) => {
            if (isRecording) return;
            addPoint(e.latlng.lat, e.latlng.lng);
        });

        function addPoint(lat, lon) {
            const newPos = L.latLng(lat, lon);
            if (points.length > 0) {
                const lastPos = L.latLng(points[points.length-1].lat, points[points.length-1].lon);
                totalDist += lastPos.distanceTo(newPos) / 1000;
            }
            points.push({lat: lat.toFixed(6), lon: lon.toFixed(6)});
            routeLine.addLatLng(newPos);
            updateUI();
        }

        async function toggleRecording() {
            const btn = document.getElementById('recordBtn');
            isRecording = !isRecording;

            if (isRecording) {
                btn.innerText = "⏺ Recording...";
                btn.classList.add('active');
                
                try { 
                    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); 
                } catch (err) {}

                watchID = navigator.geolocation.watchPosition(
                    (pos) => {
                        addPoint(pos.coords.latitude, pos.coords.longitude);
                        map.panTo([pos.coords.latitude, pos.coords.longitude]);
                    },
                    (err) => console.error(err),
                    { enableHighAccuracy: true, maximumAge: 0 }
                );
            } else {
                btn.innerText = "Start Recce Recording";
                btn.classList.remove('active');
                if (watchID) navigator.geolocation.clearWatch(watchID);
                if (wakeLock) { wakeLock.release(); wakeLock = null; }
            }
        }

        function updateUI() {
            document.getElementById('stat-points').innerText = `PTS: ${points.length}`;
            document.getElementById('stat-dist').innerText = `${totalDist.toFixed(2)} km`;
        }

        function downloadGPX() {
            if(points.length < 2) return alert("Add more points first!");
            let gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="RallyRM" xmlns="http://www.topografix.com/GPX/1/1"><trk><name>Recce</name><trkseg>`;
            points.forEach(p => gpx += `\n<trkpt lat="${p.lat}" lon="${p.lon}"><ele>0</ele></trkpt>`);
            gpx += `\n</trkseg></trk></gpx>`;
            const blob = new Blob([gpx], { type: 'application/gpx+xml' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `route_${Date.now()}.gpx`;
            a.click();
        }

        function clearRoute() {
            if(!confirm("Clear everything?")) return;
            points = [];
            totalDist = 0;
            routeLine.setLatLngs([]);
            updateUI();
        }
    </script>
</body>
</html>
